<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="csp-nonce" content="{{ csp_nonce() }}">
  <title>Game Vault · DragonsVault</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ static_url('css/game-vault.css') }}?v=20260709-4">

  <script nonce="{{ csp_nonce() }}">
    // Config for the standalone app bundle. Fully self-contained.
    window.GAME_VAULT = {
      apiBase: "{{ url_for('game_vault.index') }}api",
      csrfToken: document.querySelector('meta[name="csrf-token"]')?.content || '',
      winConditions: {{ win_conditions | tojson }},
      knownSources: {{ known_sources | tojson }}
    };
  </script>
</head>
<body class="gv-body">
  <header class="gv-header">
    <div class="gv-brand">
      <i class="bi bi-shield-lock"></i>
      <span>Game&nbsp;Vault</span>
      <span class="gv-brand-sub d-none d-md-inline">· your Magic game log</span>
    </div>
    <nav class="gv-tabs" role="tablist" aria-label="Sections">
      <button class="gv-tab active" data-tab="dashboard" type="button">Dashboard</button>
      <button class="gv-tab" data-tab="players" type="button">Players &amp; Decks</button>
      <button class="gv-tab" data-tab="games" type="button">Games</button>
    </nav>
    <div class="gv-header-actions">
      <a class="gv-btn gv-btn-ghost gv-btn-sm" href="/">
        <i class="bi bi-box-arrow-up-left"></i><span class="d-none d-sm-inline">Back to app</span>
      </a>
    </div>
  </header>

  <div class="gv-shell">
    <!-- Dashboard ------------------------------------------------------- -->
    <section data-panel="dashboard">
      <div class="gv-stat-grid" id="gvStats"></div>
      <div class="gv-board-grid gv-mt" id="gvBoards"></div>
      <div class="gv-mt">
        <div class="gv-section-head">
          <div><h2>Recent games</h2></div>
          <button class="gv-btn gv-btn-primary gv-btn-sm" data-action="log-game" type="button">
            <i class="bi bi-plus-lg"></i> Log game
          </button>
        </div>
        <div class="gv-games" id="gvRecentGames"></div>
      </div>
    </section>

    <!-- Players & Decks ------------------------------------------------- -->
    <section data-panel="players" hidden>
      <div class="gv-section-head">
        <div>
          <h2>Players &amp; Decks</h2>
          <p>Add the people you play with, then load their decks from Archidekt, Moxfield, or MTGGoldfish.</p>
        </div>
        <div style="display:flex; gap:.5rem; flex-wrap:wrap">
          <button class="gv-btn gv-btn-ghost" data-action="map-decks" type="button">
            <i class="bi bi-diagram-3"></i> Map game decks
          </button>
          <button class="gv-btn gv-btn-primary" data-action="add-player" type="button">
            <i class="bi bi-person-plus"></i> Add player
          </button>
        </div>
      </div>
      <div class="gv-players" id="gvPlayers"></div>
    </section>

    <!-- Games ----------------------------------------------------------- -->
    <section data-panel="games" hidden>
      <div class="gv-section-head">
        <div>
          <h2>Game log</h2>
          <p>Every game you record here, with winner, decks, and notes.</p>
        </div>
        <button class="gv-btn gv-btn-primary" data-action="log-game" type="button">
          <i class="bi bi-plus-lg"></i> Log game
        </button>
      </div>
      <div class="gv-games" id="gvAllGames"></div>
    </section>
  </div>

  <!-- Generic modal host -->
  <div class="gv-modal-overlay" id="gvModalOverlay">
    <div class="gv-modal" role="dialog" aria-modal="true">
      <div class="gv-modal-head">
        <h3 id="gvModalTitle">Title</h3>
        <button class="gv-x" type="button" data-close aria-label="Close">&times;</button>
      </div>
      <div class="gv-modal-body" id="gvModalBody"></div>
      <div class="gv-modal-foot" id="gvModalFoot"></div>
    </div>
  </div>

  <div class="gv-toasts" id="gvToasts" aria-live="polite"></div>

  <script src="{{ static_url('js/game-vault.js') }}?v=20260709-4" nonce="{{ csp_nonce() }}"></script>
</body>
</html>
