name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'

# Allow Trivy SARIF results to be uploaded to the Security tab.
permissions:
  contents: read
  security-events: write

jobs:
  python-security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: |
          backend/requirements.txt
          backend/requirements-dev.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit safety

    - name: Run pip-audit
      run: |
        pip-audit --requirement backend/requirements.txt --format json --output pip-audit-report.json || true
        pip-audit --requirement backend/requirements.txt || echo "::warning::Vulnerabilities found in dependencies"

    - name: Run safety check
      run: |
        safety check --file backend/requirements.txt --json --output safety-report.json || true
        safety check --file backend/requirements.txt || echo "::warning::Vulnerabilities found in dependencies"

    - name: Upload audit reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-audit-reports
        path: |
          pip-audit-report.json
          safety-report.json
        retention-days: 30

  npm-security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Run npm audit
      working-directory: frontend
      run: |
        npm audit --json > npm-audit-report.json || true
        npm audit || echo "::warning::Vulnerabilities found in npm dependencies"

    - name: Upload npm audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: npm-audit-report
        path: frontend/npm-audit-report.json
        retention-days: 30

  docker-security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Install Trivy
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin v0.71.1

    - name: Run Trivy filesystem scan
      run: |
        trivy fs --format sarif --output trivy-results.sarif \
          --severity CRITICAL,HIGH --exit-code 0 .

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
