[pytest]
addopts = --import-mode=importlib --cov=backend --cov-report=html --cov-report=term --cov-report=xml --cov-fail-under=75
cache_dir = /tmp/dragonsvault-pytest-cache
markers =
    ui: browser-based tests that require Playwright and installed webdrivers

[coverage:run]
source = backend
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

