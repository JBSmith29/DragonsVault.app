[pytest]
# Coverage is report-only (no --cov-fail-under gate). Real coverage is ~55%;
# the previous 75% gate failed every push. Use `hatch run test-cov-fail` for a
# strict local check, or re-add --cov-fail-under here to gate once coverage rises.
addopts = --import-mode=importlib --cov=backend --cov-report=html --cov-report=term --cov-report=xml
cache_dir = /tmp/dragonsvault-pytest-cache
markers =
    ui: browser-based tests that require Playwright and installed webdrivers

[coverage:run]
source = backend
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

